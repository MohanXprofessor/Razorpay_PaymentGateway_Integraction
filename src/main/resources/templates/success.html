<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .success-card {
            background: #ffffff;
            padding: 36px 32px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h2 {
            margin-bottom: 10px;
            color: #166534;
        }

        p {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 24px;
        }

        a {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
        }

        .secure {
            margin-top: 18px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon">✅</div>

    <h2>Payment Successful</h2>
    <p>Thank you for your payment. Your transaction was completed successfully.</p>

    <a href="/">Go Home</a>

    <div class="secure">
        🔒 Transaction secured by Razorpay
    </div>
</div>

</body>
</html>
