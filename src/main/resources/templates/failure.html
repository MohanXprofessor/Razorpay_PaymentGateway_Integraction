<!DOCTYPE html>
<html>
<head>
    <title>Payment Failed</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .failure-card {
            background: #ffffff;
            padding: 36px 32px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h2 {
            margin-bottom: 10px;
            color: #7f1d1d;
        }

        p {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 24px;
        }

        a {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
        }

        .support {
            margin-top: 18px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="failure-card">
    <div class="icon">❌</div>

    <h2>Payment Failed</h2>
    <p>Something went wrong. Please try again or use a different payment method.</p>

    <a href="/">Retry Payment</a>

    <div class="support">
        Need help? Contact support.
    </div>
</div>

</body>
</html>
